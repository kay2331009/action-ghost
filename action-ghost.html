<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苹果幽灵叫你做件事</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#030508;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    color:#f0e6d3;overflow:hidden;padding:24px 16px;
    position:relative
  }

  /* 背景星星 */
  .stars{position:fixed;inset:0;z-index:0;cursor:pointer}
  .star{position:absolute;border-radius:50%;background:#fff;
    animation:twinkle var(--d,3s) ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.9}}

  /* 视觉区：幽灵+苹果上下排列 */
  .visual-section{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;margin-bottom:32px}

  /* 幽灵 */
  .ghost-wrap{width:180px;height:160px;cursor:pointer;transition:transform 0.3s;overflow:visible}
  .ghost-wrap:hover{transform:scale(1.05)}
  .ghost-wrap svg{width:180px;height:160px;filter:drop-shadow(0 0 18px rgba(200,83,74,0.3))}
  .ghost-body{animation:ghostFloat 3s ease-in-out infinite}
  @keyframes ghostFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .ghost-eye{animation:ghostBlink 4s ease-in-out infinite}
  @keyframes ghostBlink{0%,90%,100%{opacity:1}95%{opacity:0}}
  .ghost-mouth{animation:ghostSpeak 2.5s ease-in-out infinite}
  @keyframes ghostSpeak{0%,100%{d:path('M-10,-10 Q0,-3 10,-10')}50%{d:path('M-10,-10 Q0,5 10,-10')}}
  .ghost-glow{animation:ghostGlow 2s ease-in-out infinite}
  @keyframes ghostGlow{0%,100%{opacity:0.5}50%{opacity:1}}

  /* 可爱圆润苹果 */
  .apple-wrap{width:90px;height:90px;cursor:pointer;transition:transform 0.3s;animation:appleFloat 3s ease-in-out infinite}
  .apple-wrap:hover{transform:scale(1.08)}
  .apple-wrap svg{width:90px;height:90px;filter:drop-shadow(0 0 20px rgba(200,83,74,0.5))}
  @keyframes appleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  .title{
    font-size:1.35rem;letter-spacing:8px;margin-bottom:6px;
    color:#c8534a;text-align:center;position:relative;z-index:1;
    text-shadow:0 0 30px rgba(200,83,74,0.4)
  }
  .subtitle{
    font-size:0.58rem;opacity:0.4;letter-spacing:4px;
    margin-bottom:32px;text-align:center;position:relative;z-index:1
  }

  /* 翻转卡 */
  .card-scene{position:relative;z-index:1;width:100%;max-width:360px;min-height:140px;perspective:1200px;margin-bottom:0;cursor:pointer}
  .card-inner{width:100%;min-height:140px;position:relative;transform-style:preserve-3d;transition:transform 0.6s cubic-bezier(0.4,0,0.2,1);border-radius:16px}
  .card-inner.flipped{transform:rotateY(180deg)}
  .card-face{position:absolute;inset:0;min-height:140px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;-webkit-backface-visibility:hidden;backface-visibility:hidden}
  .card-front{background:rgba(200,83,74,0.06);border:1px solid rgba(200,83,74,0.22)}
  .card-back{background:rgba(200,83,74,0.04);border:1px solid rgba(200,83,74,0.18);transform:rotateY(180deg)}

  .card-cat{font-size:0.58rem;letter-spacing:3px;color:rgba(200,83,74,0.5);margin-bottom:8px}
  .card-text{font-size:1.05rem;line-height:2;color:rgba(240,230,211,0.9);letter-spacing:1px}
  .card-watermark{position:absolute;bottom:10px;right:14px;font-size:11px;letter-spacing:3px;color:rgba(200,83,74,0.22);font-family:serif;pointer-events:none;animation:heartbeat 2s ease-in-out infinite}
  @keyframes heartbeat{0%,100%{opacity:0.18}50%{opacity:0.45}}

  /* 乱码动画 */
  @keyframes shake-breathe{0%,100%{transform:translate(0,0);filter:blur(0px);opacity:0.8}20%{transform:translate(-1px,0.5px);filter:blur(0.3px);opacity:0.55}40%{transform:translate(0.5px,-0.5px);filter:blur(0.8px);opacity:0.75}60%{transform:translate(-0.5px,-1px);filter:blur(0.5px);opacity:0.65}80%{transform:translate(1px,0);filter:blur(0.2px);opacity:0.7}}
  .obfuscated-inline{animation:shake-breathe 3s ease-in-out infinite;display:inline-block}

  /* 卡牌背面动画覆盖层 */
  .card-back-anim{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:16px;
    pointer-events:none;
    z-index:10;
    background:rgba(200,83,74,0.04);
  }
  .anim-normal{animation:normal-shake 4s ease-in-out infinite}
  @keyframes normal-shake{0%,100%{transform:translate(0,0);filter:blur(0px);opacity:0.8}25%{transform:translate(-0.5px,0.3px);filter:blur(0.3px);opacity:0.6}50%{transform:translate(0.4px,-0.3px);filter:blur(0.4px);opacity:0.65}75%{transform:translate(-0.4px,-0.5px);filter:blur(0.3px);opacity:0.55}}
  .type-dots{animation:typing-shake 2s ease-in-out infinite;font-size:1.05rem;line-height:2;letter-spacing:1px}
  @keyframes typing-shake{0%,100%{transform:translate(0,0);filter:blur(0px);opacity:0.7}25%{transform:translate(-0.5px,0.3px);filter:blur(0.2px);opacity:0.5}50%{transform:translate(0.4px,-0.3px);filter:blur(0.4px);opacity:0.6}75%{transform:translate(-0.4px,-0.5px);filter:blur(0.3px);opacity:0.45}}
  .ghost-text{position:relative;animation:ghost-duplicate 0.5s ease-in-out infinite;filter:blur(0.8px);display:inline-block}
  .ghost-text::before,.ghost-text::after{content:attr(data-text);position:absolute;left:0;top:0;animation:ghost-duplicate 0.5s ease-in-out infinite}
  .ghost-text::before{animation-delay:0.06s;filter:blur(1.2px);opacity:0.6}
  .ghost-text::after{animation-delay:0.12s;filter:blur(1.6px);opacity:0.4}
  @keyframes ghost-duplicate{0%{transform:translate(0,0) skewX(0deg);filter:blur(0.8px);opacity:0.8}20%{transform:translate(-3px,2px) skewX(-6deg);filter:blur(1.2px);opacity:0.5}40%{transform:translate(3px,-2px) skewX(4deg);filter:blur(1px);opacity:0.65}60%{transform:translate(-2px,-3px) skewX(-3deg);filter:blur(1.5px);opacity:0.4}80%{transform:translate(2px,1px) skewX(2deg);filter:blur(0.9px);opacity:0.55}}
  @keyframes fade-in-slow{0%{opacity:0;filter:blur(8px);transform:scale(0.95)}100%{opacity:1;filter:blur(0px);transform:scale(1)}}
  .fade-in-normal{animation:fade-in-slow 1s ease-out forwards}
  @keyframes blur-out{0%{opacity:1;filter:blur(0px)}100%{opacity:0;filter:blur(6px)}}
  .blur-out{animation:blur-out 0.4s ease-in-out forwards}

  /* 提示文字 */
  .hint{position:relative;z-index:1;margin-top:18px;font-size:0.58rem;color:rgba(200,83,74,0.3);letter-spacing:3px;animation:pulse 3s ease-in-out infinite;white-space:nowrap}
  @keyframes pulse{0%,100%{opacity:0.25}50%{opacity:0.7}}

  .count-badge{position:fixed;top:20px;right:20px;font-size:0.58rem;color:rgba(200,83,74,0.4);letter-spacing:2px;z-index:2}
  .heart-test{position:fixed;bottom:20px;right:20px;font-size:22px;cursor:pointer;z-index:10;opacity:0.5;transition:opacity 0.3s;user-select:none}
  .heart-test:hover{opacity:1}

  /* 总览按钮 */
  .all-btn{position:relative;z-index:1;margin-top:20px;padding:7px 22px;background:transparent;border:1px solid rgba(200,83,74,0.2);color:rgba(200,83,74,0.4);border-radius:30px;font-size:0.62rem;letter-spacing:2px;cursor:pointer;transition:all 0.3s}
  .all-btn:hover{color:#c8534a;border-color:rgba(200,83,74,0.4)}

  /* 总览弹窗 */
  .all-overlay{position:fixed;inset:0;background:rgba(3,5,8,0.95);z-index:200;display:none;flex-direction:column;align-items:center;padding:24px 16px;overflow-y:auto}
  .all-overlay.show{display:flex}
  .all-header{font-size:0.7rem;letter-spacing:5px;color:#c8534a;margin-bottom:14px;text-align:center}
  .all-close{position:fixed;top:20px;right:20px;padding:8px 16px;background:rgba(200,83,74,0.08);border:1px solid rgba(200,83,74,0.25);color:#c8534a;border-radius:20px;font-size:0.65rem;letter-spacing:2px;cursor:pointer;z-index:201;transition:all 0.3s}
  .all-close:hover{background:rgba(200,83,74,0.15)}
  .all-tabs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:14px;width:100%;max-width:640px}
  .all-tab{padding:5px 12px;background:rgba(200,83,74,0.05);border:1px solid rgba(200,83,74,0.18);color:rgba(200,83,74,0.5);border-radius:14px;font-size:0.6rem;letter-spacing:1px;cursor:pointer;transition:all 0.2s}
  .all-tab.active{background:rgba(200,83,74,0.15);border-color:#c8534a;color:#c8534a}
  .all-tab.heart{color:#e07a5f;border-color:rgba(224,122,95,0.3)}
  .all-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;width:100%;max-width:640px}
  .all-item{padding:12px 14px;background:rgba(200,83,74,0.04);border:1px solid rgba(200,83,74,0.12);border-radius:10px;font-size:0.78rem;line-height:1.8;color:rgba(240,230,211,0.8);letter-spacing:0.3px}
  .all-item-cat{font-size:0.55rem;letter-spacing:2px;color:rgba(200,83,74,0.45);margin-bottom:4px}
  .all-item-cat.heart{color:#e07a5f;letter-spacing:4px}
  .all-item.hidden-card{position:relative}
  .all-item.hidden-card .all-item-cat{opacity:0.3}
  .all-item.hidden-card .hidden-text{
    filter:blur(14px);opacity:0;user-select:none;
    pointer-events:none;display:block;overflow:hidden;
    max-height:60px;
  }
  @keyframes hidden-breathe{0%,100%{opacity:0.08;transform:scale(1)}50%{opacity:0.6;transform:scale(1.15)}}
  .all-item.hidden-card .hidden-placeholder{
    display:inline-block;letter-spacing:4px;font-size:1.2rem;
    color:rgba(240,230,211,0.08);
    animation:hidden-breathe 2s ease-in-out infinite;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="visual-section">
  <!-- 幽灵 -->
  <div class="ghost-wrap" id="ghostBtn" title="点击抽取行动指令">
    <svg viewBox="20 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <g class="ghost-body" transform="translate(100,75)">
        <ellipse class="ghost-glow" cx="0" cy="5" rx="48" ry="58" fill="rgba(200,83,74,0.12)" stroke="rgba(200,83,74,0.15)" stroke-width="0.5"/>
        <path d="M-34,-15 Q-38,-42 -18,-60 Q0,-70 18,-60 Q38,-42 34,-15 Q26,28 16,46 Q8,62 0,70 Q-8,62 -16,46 Q-26,28 -34,-15Z" fill="rgba(240,238,230,0.06)" stroke="rgba(200,83,74,0.22)" stroke-width="0.8"/>
        <path d="M-28,-10 Q-30,-38 -14,-54 Q0,-62 14,-54 Q30,-38 28,-10 Q21,22 12,38 Q6,52 0,58 Q-6,52 -12,38 Q-21,22 -28,-10Z" fill="rgba(240,238,230,0.05)" stroke="rgba(200,83,74,0.1)" stroke-width="0.5"/>
        <ellipse class="ghost-eye" cx="-10" cy="-24" rx="4.5" ry="5.5" fill="rgba(200,83,74,0.65)" filter="url(#glow)"/>
        <circle cx="-10" cy="-25" r="1.8" fill="#c8534a"/>
        <ellipse class="ghost-eye" cx="10" cy="-24" rx="4.5" ry="5.5" fill="rgba(200,83,74,0.65)" filter="url(#glow)"/>
        <circle cx="10" cy="-25" r="1.8" fill="#c8534a"/>
        <path class="ghost-mouth" d="M-8,-8 Q0,-2 8,-8" stroke="rgba(200,83,74,0.45)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
        <path d="M-18,44 Q-9,52 0,44 Q9,36 18,44" stroke="rgba(200,83,74,0.18)" stroke-width="0.8" fill="none"/>
      </g>
      <circle cx="50" cy="45" r="2.5" fill="rgba(200,83,74,0.18)"/>
      <circle cx="148" cy="55" r="2" fill="rgba(200,83,74,0.14)"/>
      <circle cx="62" cy="130" r="2" fill="rgba(200,83,74,0.16)"/>
      <circle cx="140" cy="122" r="1.5" fill="rgba(200,83,74,0.12)"/>
    </svg>
  </div>
  <!-- 可爱圆润苹果 -->
  <div class="apple-wrap" id="appleBtn" title="点击抽取行动指令">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="appleAura" cx="50%" cy="50%">
          <stop offset="0%" stop-color="#c8534a" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="appleBodyGrad" cx="38%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#d4645a"/>
          <stop offset="60%" stop-color="#c8534a"/>
          <stop offset="100%" stop-color="#8B0000"/>
        </radialGradient>
        <filter id="appleShadow">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#8B0000" flood-opacity="0.4"/>
        </filter>
      </defs>
      <!-- 外层光晕 -->
      <ellipse cx="50" cy="55" rx="44" ry="38" fill="rgba(200,83,74,0.04)" stroke="rgba(200,83,74,0.2)" stroke-width="1"/>
      <!-- 苹果主体：椭圆，无边界线 -->
      <ellipse cx="50" cy="55" rx="38" ry="33" fill="rgba(200,83,74,0.12)" stroke="none"/>
      <!-- 内部腮红 -->
      <ellipse cx="34" cy="54" rx="7" ry="5" fill="rgba(180,60,60,0.12)" transform="rotate(-15,34,54)"/>
      <ellipse cx="66" cy="54" rx="7" ry="5" fill="rgba(180,60,60,0.12)" transform="rotate(15,66,54)"/>
      <!-- 叶子 -->
      <path d="M50,26 Q46,18 50,14 Q58,14 60,20 Q56,22 50,26Z" fill="rgba(80,160,80,0.45)" stroke="rgba(80,160,80,0.3)" stroke-width="0.5"/>
      <!-- 笑脸 -->
      <circle cx="40" cy="52" r="2" fill="rgba(200,83,74,0.35)"/>
      <circle cx="60" cy="52" r="2" fill="rgba(200,83,74,0.35)"/>
      <path d="M40,58 Q50,62 60,58" stroke="rgba(200,83,74,0.3)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="title">苹果幽灵叫你做件事</div>
<div class="subtitle">MAKE A MOVE · 犹豫吗？让幽灵推你一把</div>

<div class="card-scene" id="cardScene">
  <div class="card-inner" id="cardInner">
    <!-- 正面：乱码（默认） -->
    <div class="card-face card-front" id="cardFront">
      <div class="card-cat" id="cardCat">— 此刻 —</div>
      <div class="card-text" id="cardText">点击上方幽灵，领取你的行动指令</div>
      <div class="card-watermark" id="cardWatermark">CALEB̶ 🍎</div>
    </div>
    <!-- 背面：清晰内容（翻转后） -->
    <div class="card-face card-back" id="cardBack">
      <div class="card-back-anim" id="cardBackAnim">
        <span id="backAnimContent" style="font-size:1.05rem;line-height:2;color:rgba(240,230,211,0.9);letter-spacing:1px">点我点我</span>
      </div>
      <div class="card-text" id="cardBackText"></div>
    </div>
  </div>
</div>

<div class="hint" id="hint">👻 幽灵正在等待...</div>

<div class="count-badge" id="countBadge">已行动 0 次</div>

<div class="heart-test" id="heartTest" title="测试特殊卡">♡</div>

<button class="all-btn" id="allBtn" onclick="showAll()">总览全部 96 条</button>

<div class="all-overlay" id="allOverlay">
  <button class="all-close" onclick="closeAll()">关闭</button>
  <div class="all-header">— 行动指南总览 —</div>
  <div class="all-tabs" id="allTabs"></div>
  <div class="all-grid" id="allGrid"></div>
</div>

<script>
const actions = [
  { text: "", category: "♡" },
  { text: "现在就发给对方一句真诚的问候，不要等", category: "人际" },
  { text: "关掉手机通知，专注做一件事25分钟", category: "专注" },
  { text: "把脑子里反复想的那句话写下来", category: "表达" },
  { text: "跟一个久未联系的人发一条消息", category: "人际" },
  { text: "把桌上堆的东西整理一件", category: "行动" },
  { text: "现在就做那件你已经拖了三天的事", category: "克服拖延" },
  { text: "出门走五分钟，换换空气", category: "身体" },

  { text: "深呼吸三次，然后做决定", category: "启动" },

  { text: "把你一直想删的东西删掉", category: "整理" },

let count = 0;
let lastIndex = -1;
let isFlipped = false;
let isDrawn = false;
let isAnimating = false;

// 五阶段卡牌动画（在背面播放）
function runCardAnim() {
  if (isAnimating) return;
  isAnimating = true;
  var overlay = document.getElementById('cardBackAnim');
  var content = document.getElementById('backAnimContent');
  var backText = document.getElementById('cardBackText');

  // 隐藏真实文字，显示动画层
  backText.style.visibility = 'hidden';
  overlay.style.display = 'flex';
  var realText = backText.textContent || '来找我';

  var phase = 0;
  // [点我点我5s, 模糊淡出0.4s, 点点点2s, 我我我1.2s, 显形1s, 循环过渡0.6s]
  var phaseDuration = [5000, 400, 2000, 1200, 1000, 600];

  function runPhase() {
    var dur = phaseDuration[phase];

    if (phase === 0) {
      // 点我点我 - 正常抖动
      content.className = 'anim-normal';
      content.textContent = '点我点我';

    } else if (phase === 1) {
      // 模糊淡出
      content.className = 'blur-out';
      content.textContent = '点我点我';

    } else if (phase === 2) {
      // 点点点打字出现
      content.className = 'type-dots';
      content.textContent = '';
      var dots = ['点', '点点', '点点点', '点点点·', '点点点··', '点点点···'];
      var i = 0;
      var typeInterval = setInterval(function() {
        content.textContent = dots[i] || '点点点···';
        i++;
        if (i > dots.length) clearInterval(typeInterval);
      }, 250);

    } else if (phase === 3) {
      // 我我我重影
      content.className = '';
      content.innerHTML = '<span class="ghost-text" data-text="我我我">我我我</span>';

    } else if (phase === 4) {
      // 慢慢显形真实文字
      content.className = 'fade-in-normal';
      content.textContent = realText; // 显形真实文字

    } else if (phase === 5) {
      // 阶段5：模糊过渡，准备进入下一轮
      content.className = 'blur-out';
      content.textContent = realText; // 过渡真实文字

    } else {
      // 动画结束，循环回阶段0
      phase = 0;
      setTimeout(runPhase, 400);
      return;
    }

    phase++;
    setTimeout(runPhase, dur);
  }

  runPhase();
}

function initStars() {
  const stars = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.width = s.style.height = (Math.random() * 2 + 0.5) + 'px';
    s.style.setProperty('--d', (Math.random() * 4 + 2) + 's');
    s.style.animationDelay = Math.random() * 4 + 's';
    stars.appendChild(s);
  }
  stars.addEventListener('click', function() { if (isDrawn) resetCard(); });
}

function flipCard() {
  const inner = document.getElementById('cardInner');
  if (!isDrawn) return;
  isFlipped = !isFlipped;
  if (isFlipped) {
    inner.classList.add('flipped');
    // 翻转后播放五阶段动画
    setTimeout(runCardAnim, 300);
  } else {
    inner.classList.remove('flipped');
  }
}

function drawCard(data) {
  const inner = document.getElementById('cardInner');
  const cat = document.getElementById('cardCat');
  const text = document.getElementById('cardText');
  const watermark = document.getElementById('cardWatermark');
  const backText = document.getElementById('cardBackText');

  if (isFlipped) { inner.classList.remove('flipped'); isFlipped = false; }

  if (data.category === '♡') {
    cat.textContent = '♡'; cat.style.color = '#e07a5f'; cat.style.letterSpacing = '4px';
    watermark.style.display = 'block';
    text.innerHTML = '<span class="obfuscated-inline">来找我̷̢̧̨̛̛̛</span>';
    backText.textContent = '来找我';
  } else {
    cat.textContent = data.category; cat.style.color = ''; cat.style.letterSpacing = '';
    text.textContent = data.text; watermark.style.display = 'none';
    backText.textContent = data.text;
  }

  isDrawn = true;
  count++;
  document.getElementById('countBadge').textContent = '已行动 ' + count + ' 次';
  document.getElementById('hint').textContent = '👻 点击卡片翻页查看';
}

function resetCard() {
  const inner = document.getElementById('cardInner');
  const cat = document.getElementById('cardCat');
  const text = document.getElementById('cardText');
  const watermark = document.getElementById('cardWatermark');
  const backAnim = document.getElementById('cardBackAnim');
  const backText = document.getElementById('cardBackText');
  if (isFlipped) { inner.classList.remove('flipped'); isFlipped = false; }
  cat.textContent = '— 此刻 —'; cat.style.color = ''; cat.style.letterSpacing = '';
  text.textContent = '点击上方幽灵，领取你的行动指令';
  text.style.visibility = 'visible';
  watermark.style.display = 'none';
  backAnim.style.display = 'none';
  backText.style.visibility = 'visible';
  isDrawn = false;
  isAnimating = false;
  document.getElementById('hint').textContent = '👻 幽灵正在等待...';
}

function drawAction() {
  let idx;
  do { idx = Math.floor(Math.random() * actions.length); }
  while (idx === lastIndex && actions.length > 1);
  lastIndex = idx;
  drawCard(actions[idx]);
}

document.getElementById('ghostBtn').addEventListener('click', function() { if (isDrawn) { resetCard(); } else { drawAction(); } });
document.getElementById('appleBtn').addEventListener('click', function() { if (isDrawn) { resetCard(); } else { drawAction(); } });
document.getElementById('cardScene').addEventListener('click', function() { if (isDrawn) flipCard(); });
document.getElementById('heartTest').addEventListener('click', function(e) { e.stopPropagation(); resetCard(); setTimeout(function() { drawCard({ category: '♡', text: '' }); }, 400); });

let currentCat = '全部';
function showAll(cat) {
  if (!cat) cat = currentCat; currentCat = cat;
  const grid = document.getElementById('allGrid');
  const tabs = document.getElementById('allTabs');
  grid.innerHTML = '';
  var cats = ['全部', '♡'];
  actions.forEach(a => { if (a.category !== '♡' && !cats.includes(a.category)) cats.push(a.category); });
  tabs.innerHTML = '';
  cats.forEach(c => { var btn = document.createElement('button'); btn.className = 'all-tab' + (c === cat ? ' active' : ''); btn.textContent = c === '♡' ? '♡' : c; btn.onclick = function() { showAll(c); }; tabs.appendChild(btn); });
  // ♡ tab shows one blurred hidden card row; otherwise hide ♡ cards
  var filtered;
  if (cat === '♡') {
    filtered = [{ category: '♡', text: '来找我', isHidden: true }];
  } else if (cat === '全部') {
    filtered = actions.filter(a => a.category !== '♡');
  } else {
    filtered = actions.filter(a => a.category === cat && a.category !== '♡');
  }
  filtered.forEach(a => {
    var div = document.createElement('div');
    div.className = 'all-item' + (a.isHidden ? ' hidden-card' : '');
    var catDiv = document.createElement('div');
    catDiv.className = 'all-item-cat' + (a.category === '♡' ? ' heart' : '');
    catDiv.textContent = a.category === '♡' ? '♡ 隐藏结局' : a.category;
    div.appendChild(catDiv);
    var textSpan = document.createElement('span');
    if (a.isHidden) {
      textSpan.className = 'hidden-text';
      textSpan.textContent = a.text;
      var placeholder = document.createElement('span');
      placeholder.className = 'hidden-placeholder';
      placeholder.textContent = '▨▨▨';
      div.appendChild(textSpan);
      div.appendChild(placeholder);
    } else {
      textSpan.textContent = a.text;
      div.appendChild(textSpan);
    }
    grid.appendChild(div);
  });
  document.getElementById('allOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeAll() { document.getElementById('allOverlay').classList.remove('show'); document.body.style.overflow = ''; }

initStars();
</script>
