<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱码动画测试 v5</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#030508;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    color:#f0e6d3;padding:24px;
  }
  h2{margin-bottom:30px;font-size:1.2rem;color:#c8534a;letter-spacing:4px}

  .test-row{display:flex;flex-direction:column;align-items:center;margin-bottom:40px}
  .test-label{margin-bottom:12px;font-size:0.7rem;color:rgba(200,83,74,0.5);letter-spacing:2px}

  .card{
    width:300px;min-height:80px;
    background:rgba(200,83,74,0.06);border:1px solid rgba(200,83,74,0.22);
    border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
  }
  .card-text{font-size:1.1rem;line-height:2;color:rgba(240,230,211,0.9);text-align:center}

  /* 正常模糊抖动 */
  @keyframes normal-shake{0%,100%{transform:translate(0,0);filter:blur(0px);opacity:0.8}25%{transform:translate(-0.5px,0.3px);filter:blur(0.3px);opacity:0.6}50%{transform:translate(0.4px,-0.3px);filter:blur(0.4px);opacity:0.65}75%{transform:translate(-0.4px,-0.5px);filter:blur(0.3px);opacity:0.55}}
  .normal{animation:normal-shake 4s ease-in-out infinite}

  /* 前瑶点点打字效果 */
  @keyframes typing{0%,100%{opacity:0.6}50%{opacity:0.9}}
  .type-dots{animation:typing 1.5s ease-in-out infinite}

  /* 我我我重影效果 - 三层都模糊，发疯感 */
  @keyframes ghost-duplicate{
    0%{transform:translate(0,0) skewX(0deg);filter:blur(0.5px);opacity:0.8}
    25%{transform:translate(-2px,1px) skewX(-4deg);filter:blur(1px);opacity:0.5}
    50%{transform:translate(2px,-1px) skewX(3deg);filter:blur(0.8px);opacity:0.6}
    75%{transform:translate(-1px,-2px) skewX(-2deg);filter:blur(1.2px);opacity:0.4}
  }
  .ghost-text{
    position:relative;
    animation:ghost-duplicate 0.25s ease-in-out infinite;
    filter:blur(0.8px);
  }
  .ghost-text::before,
  .ghost-text::after{
    content:attr(data-text);
    position:absolute;left:0;top:0;
    animation:ghost-duplicate 0.25s ease-in-out infinite;
  }
  .ghost-text::before{animation-delay:0.04s;filter:blur(1px);opacity:0.6}
  .ghost-text::after{animation-delay:0.08s;filter:blur(1.5px);opacity:0.4}
</style>
</head>
<body>

<h2>三阶段乱码动画</h2>

<div class="test-row">
  <div class="test-label">完整三阶段循环演示</div>
  <div class="card">
    <div class="card-text" id="demoMain"></div>
  </div>
</div>

<div class="test-row">
  <div class="test-label">① 点我点我（正常模糊抖动）</div>
  <div class="card">
    <div class="card-text normal">点我点我</div>
  </div>
</div>

<div class="test-row">
  <div class="test-label">② 点点点...（前瑶打字效果）</div>
  <div class="card">
    <div class="card-text" id="demoType"></div>
  </div>
</div>

<div class="test-row">
  <div class="test-label">③ 我我我（重影模糊）</div>
  <div class="card">
    <div class="card-text"><span class="ghost-text" data-text="我我我">我我我</span></div>
  </div>
</div>

<script>
// 三阶段循环
var phase = 0; // 0=正常, 1=点点点, 2=我我我
var mainEl = document.getElementById('demoMain');

// 阶段时长（毫秒）
var phaseDuration = [3500, 2000, 1200]; // 正常3.5s, 点点2s, 我我1.2s

function runPhase() {
  var dur = phaseDuration[phase];

  if (phase === 0) {
    // 阶段1：正常点我点我 + 模糊抖动
    mainEl.className = 'card-text normal';
    mainEl.textContent = '点我点我';

  } else if (phase === 1) {
    // 阶段2：点点点点字出现
    mainEl.className = 'card-text';
    mainEl.style.filter = 'none';
    mainEl.style.opacity = '1';
    mainEl.textContent = '';

    var dots = ['点', '点点', '点点点', '点点点·', '点点点··', '点点点···'];
    var i = 0;
    var typeInterval = setInterval(function() {
      mainEl.textContent = dots[i] || '点点点···';
      i++;
      if (i > dots.length) clearInterval(typeInterval);
    }, 250);

  } else if (phase === 2) {
    // 阶段3：我我我重影模糊
    mainEl.className = 'card-text';
    mainEl.innerHTML = '<span class="ghost-text" data-text="我我我">我我我</span>';
  }

  phase = (phase + 1) % 3;
  setTimeout(runPhase, dur);
}

runPhase();

// ② 单独演示：点点点打字效果
(function(){
  var el = document.getElementById('demoType');
  var dots = ['点', '点点', '点点点', '点点点·', '点点点··', '点点点···'];
  var i = 0;
  function update() {
    el.textContent = dots[i] || '点点点···';
    el.className = 'card-text type-dots';
    i++;
    if (i > dots.length) {
      setTimeout(function(){ i = 0; update(); }, 800);
    } else {
      setTimeout(update, 250);
    }
  }
  update();
})();
</script>

</body>
</html>
