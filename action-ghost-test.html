<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>乱码动画测试 v3</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#030508;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    color:#f0e6d3;padding:24px;
  }
  h2{margin-bottom:40px;font-size:1.2rem;color:#c8534a;letter-spacing:4px}

  .test-row{display:flex;flex-direction:column;align-items:center;margin-bottom:50px}
  .test-label{margin-bottom:12px;font-size:0.7rem;color:rgba(200,83,74,0.5);letter-spacing:2px}

  .card{
    width:280px;min-height:100px;
    background:rgba(200,83,74,0.06);border:1px solid rgba(200,83,74,0.22);
    border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:28px 24px;
  }
  .card-text{font-size:1.1rem;line-height:2;color:rgba(240,230,211,0.9);text-align:center}

  /* 每个字符独立闪烁 */
  .char{
    display:inline-block;
    transition:opacity 0.1s;
  }

  /* 组合：慢抖动模糊 */
  @keyframes shake-breathe{0%,100%{transform:translate(0,0);filter:blur(0px);opacity:0.85}25%{transform:translate(-0.5px,0.3px);filter:blur(0.2px);opacity:0.6}50%{transform:translate(0.3px,-0.3px);filter:blur(0.5px);opacity:0.7}75%{transform:translate(-0.3px,-0.5px);filter:blur(0.3px);opacity:0.55}}
  .slow-shake{animation:shake-breathe 4s ease-in-out infinite}
</style>
</head>
<body>

<h2>乱码动画测试 v3</h2>

<!-- 慢速+字符错开闪烁 -->
<div class="test-row">
  <div class="test-label">④ 慢速抖动模糊 + 字符错开闪烁（JS，每个字符独立）</div>
  <div class="card">
    <div class="card-text slow-shake" id="scrambleDemo">
      <span class="char">点</span><span class="char">我</span><span class="char">点</span><span class="char">我</span>
    </div>
  </div>
</div>

<!-- 对比：更快频率 -->
<div class="test-row">
  <div class="test-label">⑤ 快速字符闪烁（JS，更密集）</div>
  <div class="card">
    <div class="card-text" id="scrambleDemo2">
      <span class="char">点</span><span class="char">我</span><span class="char">点</span><span class="char">我</span>
    </div>
  </div>
</div>

<!-- 对比：只有模糊抖动，无JS -->
<div class="test-row">
  <div class="test-label">⑥ 只有慢抖动模糊（CSS，无JS）</div>
  <div class="card">
    <div class="card-text slow-shake">✨点👻我💀点🌙我✨</div>
  </div>
</div>

<script>
  var scrambleChars = ['点','我','•','◦','◇','○','□','△','☆','★','👻','💀','🌙','✨','🍎','↑','↓','←','→','～'];
  var elements = document.querySelectorAll('#scrambleDemo .char');
  var elements2 = document.querySelectorAll('#scrambleDemo2 .char');

  function randomChar() {
    return scrambleChars[Math.floor(Math.random() * scrambleChars.length)];
  }

  // ④：每个字符独立，错开时间闪烁
  elements.forEach(function(el, i) {
    el.dataset.original = el.textContent;
    setInterval(function() {
      if (Math.random() < 0.35) {
        el.textContent = randomChar();
        el.style.opacity = '0.4';
        setTimeout(function() {
          el.textContent = el.dataset.original;
          el.style.opacity = '1';
        }, 120 + Math.random() * 150);
      }
    }, 200 + i * 180);
  });

  // ⑤：更快更密集
  elements2.forEach(function(el, i) {
    el.dataset.original = el.textContent;
    setInterval(function() {
      if (Math.random() < 0.5) {
        el.textContent = randomChar();
        el.style.opacity = '0.3';
        setTimeout(function() {
          el.textContent = el.dataset.original;
          el.style.opacity = '1';
        }, 60 + Math.random() * 100);
      }
    }, 100 + i * 80);
  });
</script>

</body>
</html>
