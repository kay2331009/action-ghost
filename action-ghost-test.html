<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>д№ұз ҒеҠЁз”»жөӢиҜ• v4</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#030508;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    color:#f0e6d3;padding:24px;
  }
  h2{margin-bottom:40px;font-size:1.2rem;color:#c8534a;letter-spacing:4px}

  .test-row{display:flex;flex-direction:column;align-items:center;margin-bottom:50px}
  .test-label{margin-bottom:12px;font-size:0.7rem;color:rgba(200,83,74,0.5);letter:2px}

  .card{
    width:280px;min-height:80px;
    background:rgba(200,83,74,0.06);border:1px solid rgba(200,83,74,0.22);
    border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px;
  }
  .card-text{font-size:1.1rem;line-height:2;color:rgba(240,230,211,0.9);text-align:center}

  @keyframes slow-breathe{0%,100%{transform:translate(0,0);filter:blur(0px);opacity:0.8}25%{transform:translate(-0.5px,0.3px);filter:blur(0.2px);opacity:0.55}50%{transform:translate(0.3px,-0.3px);filter:blur(0.5px);opacity:0.65}75%{transform:translate(-0.3px,-0.5px);filter:blur(0.3px);opacity:0.5}}
  .slow-shake{animation:slow-breathe 4s ease-in-out infinite}

  /* Cдё“з”ЁпјҡжҠ–еҠЁжЁЎзіҠ+дҝЎеҸ·ж јпјҢжӣҙж…ўжӣҙиҷҡ */
  @keyframes shake-c{0%,100%{transform:translate(0,0);filter:blur(0px);opacity:0.85}30%{transform:translate(-0.8px,0.4px);filter:blur(0.4px);opacity:0.6}60%{transform:translate(0.5px,-0.5px);filter:blur(0.6px);opacity:0.7}}
  .shake-c{animation:shake-c 5s ease-in-out infinite}

  .char{display:inline-block}
</style>
</head>
<body>

<h2>ж–ӯж–ӯз»ӯз»ӯжўҰе‘“ж•Ҳжһң</h2>

<!-- AпјҡеӨ§йғЁеҲҶзӮ№зӮ№пјҢеҒ¶е°”й—Әзңҹе®һж–Үеӯ— -->
<div class="test-row">
  <div class="test-label">A В· зӮ№зӮ№В·В·В·дёәдё»пјҢеҒ¶е°”й—Ә"зӮ№жҲ‘зӮ№жҲ‘"</div>
  <div class="card">
    <div class="card-text slow-shake" id="demoA"></div>
  </div>
</div>

<!-- BпјҡжӯЈеёёж–Үеӯ—пјҢзўҺжҲҗВ·зӮ№В·жҲ‘В·пјҢеҸҲжӢјеӣһ -->
<div class="test-row">
  <div class="test-label">B В· жӯЈеёёвҶ’зўҺиЈӮвҶ’йҮҚз»„пјҢеҫӘзҺҜ</div>
  <div class="card">
    <div class="card-text slow-shake" id="demoB"></div>
  </div>
</div>

<!-- CпјҡдҝЎеҸ·ж јжЁЎејҸ В·В·Г—В·В· -->
<div class="test-row">
  <div class="test-label">C В· B+Cз»“еҗҲ+жҠ–еҠЁжЁЎзіҠпјҡжӯЈеёё"зӮ№жҲ‘зӮ№жҲ‘"пјҢеҒ¶е°”дҝЎеҸ·ж јй—ӘзғҒ</div>
  <div class="card">
    <div class="card-text shake-c" id="demoC"></div>
  </div>
</div>

<!-- Dпјҡж…ўж…ўж¶Ҳж•ЈеҸҲйҮҚз»„ -->
<div class="test-row">
  <div class="test-label">D В· жӯЈеёёвҶ’ж¶Ҳж•ЈвҶ’ж¶ҲеӨұвҶ’йҮҚз»„пјҢеҫӘзҺҜ</div>
  <div class="card">
    <div class="card-text slow-shake" id="demoD"></div>
  </div>
</div>

<!-- Eпјҡж··еҗҲпјҢдё»дҪ“зӮ№зӮ№пјҢе№ҪзҒөз¬ҰеҸ·з©ҝжҸ’ -->
<div class="test-row">
  <div class="test-label">E В· зӮ№зӮ№дёәдё»пјҢе№ҪзҒөз¬ҰеҸ·з©ҝжҸ’пјҢеҒ¶е°”й—Әж–Үеӯ—</div>
  <div class="card">
    <div class="card-text slow-shake" id="demoE"></div>
  </div>
</div>

<script>
  var dots = 'В·В·В·В·В·В·В·В·В·В·В·В·В·В·В·В·В·В·В·В·';
  var original = 'зӮ№жҲ‘зӮ№жҲ‘';
  var ghost = ['рҹ‘»','рҹ’Җ','рҹҢҷ','вңЁ','рҹҚҺ'];

  // AпјҡеӨ§йғЁеҲҶзӮ№зӮ№пјҢеҒ¶е°”й—ӘдёҖдёӢзңҹе®һж–Үеӯ—
  (function(){
    var el = document.getElementById('demoA');
    var showingDots = true;
    function update() {
      if (showingDots) {
        // йҡҸжңәжҳҫзӨә1-3дёӘзӮ№
        el.textContent = dots.substring(0, 4 + Math.floor(Math.random() * 4));
        setTimeout(update, 600 + Math.random() * 800);
      } else {
        el.textContent = original;
        setTimeout(update, 150 + Math.random() * 200);
      }
      showingDots = !showingDots;
    }
    update();
  })();

  // BпјҡжӯЈеёёвҶ’зўҺиЈӮвҶ’йҮҚз»„пјҢеҫӘзҺҜ
  (function(){
    var el = document.getElementById('demoB');
    var phase = 0; // 0=normal, 1=breaking, 2=broken, 3=reforming
    var phaselengths = [2000, 800, 600, 800];
    function update() {
      var t = phase % 4;
      if (t === 0) {
        el.textContent = original;
      } else if (t === 1) {
        // зўҺиЈӮпјҡВ·зӮ№В·жҲ‘В·
        el.textContent = 'В·' + original[0] + 'В·' + original[1] + 'В·' + original[2] + 'В·' + original[3] + 'В·';
      } else if (t === 2) {
        el.textContent = 'В·В·В·В·В·В·В·В·';
      } else {
        // йҮҚз»„
        el.textContent = 'В·зӮ№В·жҲ‘В·';
      }
      phase++;
      setTimeout(update, phaselengths[phase % 4]);
    }
    update();
  })();

  // CпјҡдҝЎеҸ·ж ј В·В·Г—В·В·пјҲеӨ§йғЁеҲҶжӯЈеёёпјҢеҒ¶е°”й—ӘзғҒдҝЎеҸ·ж јпјү
  (function(){
    var el = document.getElementById('demoC');
    var showingNormal = true;
    function update() {
      if (showingNormal) {
        el.textContent = original;
      } else {
        // дҝЎеҸ·ж јй—ӘзғҒ
        var result = '';
        for (var i = 0; i < 5; i++) {
          if (Math.random() < 0.35) {
            result += original[Math.floor(Math.random() * 4)];
          } else {
            result += 'В·';
          }
        }
        el.textContent = result;
      }
      showingNormal = !showingNormal;
      setTimeout(update, showingNormal ? 1500 + Math.random() * 1000 : 100 + Math.random() * 100);
    }
    update();
  })();

  // DпјҡжӯЈеёёвҶ’ж¶Ҳж•ЈвҶ’ж¶ҲеӨұвҶ’йҮҚз»„пјҢеҫӘзҺҜ
  (function(){
    var el = document.getElementById('demoD');
    var step = 0;
    var steps = [
      { text: 'зӮ№жҲ‘зӮ№жҲ‘', dur: 2000 },
      { text: 'зӮ№В·В·  жҲ‘', dur: 600 },
      { text: 'В·  В· В·', dur: 600 },
      { text: 'В·В·В·В·В·В·В·В·', dur: 800 },
      { text: 'В·  В· В·', dur: 600 },
      { text: 'зӮ№В·В·  жҲ‘', dur: 600 }
    ];
    function update() {
      var s = steps[step % steps.length];
      el.textContent = s.text;
      setTimeout(update, s.dur);
      step++;
    }
    update();
  })();

  // Eпјҡж··еҗҲпјҢдё»дҪ“зӮ№зӮ№пјҢе№ҪзҒөз¬ҰеҸ·з©ҝжҸ’
  (function(){
    var el = document.getElementById('demoE');
    function update() {
      var result = '';
      var r = Math.random();
      if (r < 0.6) {
        // еӨ§йғЁеҲҶзӮ№зӮ№
        result = 'В·'.repeat(3 + Math.floor(Math.random() * 5));
      } else if (r < 0.8) {
        // е№ҪзҒөз¬ҰеҸ·
        result = ghost[Math.floor(Math.random() * ghost.length)];
      } else {
        // й—Әж–Үеӯ—
        result = original;
      }
      el.textContent = result;
      setTimeout(update, 400 + Math.random() * 600);
    }
    update();
  })();
</script>

</body>
</html>
