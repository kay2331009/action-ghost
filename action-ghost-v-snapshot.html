<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苹果叫你做件事</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#030508;
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    color:#f0e6d3;overflow:hidden;padding:24px 16px;
    position:relative
  }

  .stars{position:fixed;inset:0;pointer-events:none;z-index:0}
  .star{position:absolute;border-radius:50%;background:#fff;
    animation:twinkle var(--d,3s) ease-in-out infinite}
  @keyframes twinkle{0%,100%{opacity:0.1}50%{opacity:0.9}}

  .visual-section{
    position:relative;z-index:1;
    display:flex;flex-direction:column;align-items:center;
    margin-bottom:28px
  }

  .apple-wrap{
    width:120px;height:120px;
    cursor:pointer;transition:transform 0.3s;
    animation:appleFloat 3s ease-in-out infinite
  }
  .apple-wrap:hover{transform:scale(1.08)}
  .apple-wrap svg{width:120px;height:120px;
    filter:drop-shadow(0 0 20px rgba(200,83,74,0.5))}
  @keyframes appleFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
  }

  .title{
    font-size:1.35rem;letter-spacing:8px;margin-bottom:6px;
    color:#c8534a;text-align:center;position:relative;z-index:1;
    text-shadow:0 0 30px rgba(200,83,74,0.4)
  }
  .subtitle{
    font-size:0.58rem;opacity:0.4;letter-spacing:4px;
    margin-bottom:32px;text-align:center;position:relative;z-index:1
  }

  .action-card{
    position:relative;z-index:1;max-width:360px;width:100%;
    min-height:130px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:24px 24px;
    background:rgba(200,83,74,0.04);
    border:1px solid rgba(200,83,74,0.18);
    border-radius:16px;text-align:center;
    transition:opacity 0.5s,transform 0.5s
  }
  .action-card.fade{opacity:0;transform:translateY(10px)}

  .action-text{
    font-size:1.05rem;line-height:2;color:rgba(240,230,211,0.9);
    margin-bottom:14px;letter-spacing:0.5px
  }
  .action-category{
    font-size:0.58rem;letter-spacing:3px;color:rgba(200,83,74,0.5);
    border:1px solid rgba(200,83,74,0.2);padding:2px 10px;
    border-radius:10px;margin-bottom:14px
  }

  .btn{
    padding:8px 26px;background:transparent;
    border:1px solid rgba(200,83,74,0.35);color:#c8534a;
    border-radius:30px;font-size:0.7rem;letter-spacing:2px;
    cursor:pointer;transition:all 0.3s
  }
  .btn:hover{background:rgba(200,83,74,0.1);border-color:#c8534a}

  .hint{
    position:absolute;bottom:22px;left:50%;transform:translateX(-50%);
    font-size:0.58rem;color:rgba(200,83,74,0.3);letter-spacing:3px;
    animation:pulse 3s ease-in-out infinite;white-space:nowrap
  }
  @keyframes pulse{0%,100%{opacity:0.25}50%{opacity:0.7}}

  .count-badge{
    position:fixed;top:20px;right:20px;
    font-size:0.58rem;color:rgba(200,83,74,0.35);letter-spacing:2px;z-index:2
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="visual-section">
  <div class="apple-wrap" id="appleBtn" title="点击抽取行动指令">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="appleAura" cx="50%" cy="50%">
          <stop offset="0%" stop-color="#c8534a" stop-opacity="0.35"/>
          <stop offset="100%" stop-color="transparent"/>
        </radialGradient>
        <radialGradient id="appleBodyGrad" cx="38%" cy="35%" r="60%">
          <stop offset="0%" stop-color="#d4645a"/>
          <stop offset="60%" stop-color="#c8534a"/>
          <stop offset="100%" stop-color="#8B0000"/>
        </radialGradient>
        <filter id="appleShadow">
          <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#8B0000" flood-opacity="0.4"/>
        </filter>
      </defs>
      <!-- 光晕 -->
      <circle cx="50" cy="55" r="52" fill="url(#appleAura)"/>
      <!-- 苹果主体（圆滚滚） -->
      <ellipse cx="50" cy="57" rx="38" ry="40" fill="url(#appleBodyGrad)" filter="url(#appleShadow)"/>
      <!-- 顶部内凹 -->
      <ellipse cx="50" cy="22" rx="10" ry="5" fill="#c8534a" opacity="0.5"/>
      <!-- 左高光 -->
      <ellipse cx="34" cy="44" rx="9" ry="11" fill="rgba(255,255,255,0.18)" transform="rotate(-15,34,44)"/>
      <!-- 腮红 -->
      <ellipse cx="26" cy="62" rx="8" ry="5" fill="rgba(180,60,60,0.3)"/>
      <ellipse cx="74" cy="62" rx="8" ry="5" fill="rgba(180,60,60,0.3)"/>
      <!-- 茎 -->
      <path d="M50,20 Q48,10 52,6" stroke="#5a3a2a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- 叶子 -->
      <path d="M52,6 Q62,0 68,8 Q60,15 52,12 Q50,10 52,6Z" fill="#5a7a3a" stroke="#4a6a2a" stroke-width="0.5"/>
      <!-- 苹果底部高光弧 -->
      <path d="M35,86 Q50,94 65,86" stroke="rgba(139,0,0,0.3)" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="title">苹果叫你做件事</div>
<div class="subtitle">MAKE A MOVE · 犹豫吗？让苹果推你一把</div>

<div class="action-card" id="actionCard">
  <div class="action-category" id="actionCategory">— 此刻 —</div>
  <div class="action-text" id="actionText">点击苹果，领取你的行动指令</div>
  <button class="btn" id="actionBtn" onclick="drawAction()">抽一个</button>
</div>

<div class="hint" id="hint">🍎 苹果正在等待...</div>

<div class="count-badge" id="countBadge">已行动 0 次</div>

<script>
const actions = [
  { text: "现在就发给对方一句真诚的问候，不要等", category: "人际" },
  { text: "关掉手机通知，专注做一件事25分钟", category: "专注" },
  { text: "把脑子里反复想的那句话写下来", category: "表达" },
  { text: "跟一个久未联系的人发一条消息", category: "人际" },
  { text: "把桌上堆的东西整理一件", category: "行动" },
  { text: "现在就做那件你已经拖了三天的事", category: "克服拖延" },
  { text: "出门走五分钟，换换空气", category: "身体" },
  { text: "喝一杯水，然后开始", category: "启动" },
  { text: "告诉一个人你真实的想法", category: "表达" },
  { text: "把手机放到另一个房间", category: "专注" },
  { text: "写下此刻最让你焦虑的一件事，然后撕掉", category: "释放" },
  { text: "给三个月前的自己写一句话", category: "反思" },
  { text: "对镜子里的自己说一句鼓励的话", category: "自我" },
  { text: "查一件你一直好奇但没查的事", category: "好奇" },
  { text: "换一首不同风格的新音乐来听", category: "新鲜感" },
  { text: "主动问一个人最近怎么样", category: "人际" },
  { text: "把一个想法变成一句具体的行动", category: "行动" },
  { text: "对某人说一句谢谢你", category: "人际" },
  { text: "清理手机里一个积灰的App", category: "整理" },
  { text: "做一件不需要意义、纯粹好玩的事", category: "快乐" },
  { text: "深呼吸三次，然后做决定", category: "启动" },
  { text: "取消一个不必要的承诺", category: "减负" },
  { text: "把你一直想删的东西删掉", category: "整理" },
  { text: "给别人一个具体的赞美", category: "人际" },
  { text: "现在就预约一件一直拖着没办的事", category: "克服拖延" },
  { text: "关掉手机屏幕，闭上眼睛一分钟", category: "暂停" },
  { text: "找一个东西送给自己，哪怕是一包糖", category: "自我" },
  { text: "记录下今天让你微笑的一件小事", category: "感恩" },
  { text: "去碰一个你一直在回避的人或事", category: "克服拖延" },
  { text: "想清楚你要什么，然后说出来", category: "表达" },
  { text: "删掉一个不必要的手机应用", category: "整理" },
  { text: "做一件会让自己有点害怕的小事", category: "勇气" },
  { text: "写完一句你一直想写但没写的话", category: "表达" },
  { text: "今天第一次主动开启一个话题", category: "人际" },
  { text: "拒绝一件你内心想说不要的事", category: "自我" },
  { text: "把想法具体化：我要做X，第一步是Y", category: "行动" },
  { text: "给未来的自己布置一项任务", category: "反思" },
  { text: "把注意力放在你正在做的事情上", category: "专注" },
  { text: "做一件没有任何人要求你做的事", category: "自由" },
  { text: "联系一个能帮你往前走一步的人", category: "人际" },
  { text: "承认一件你之前不愿承认的事", category: "诚实" },
  { text: "把目标缩小到眼前这一步", category: "行动" },
  { text: "发一条不走寻常路的消息", category: "新鲜感" },
  { text: "对一个人说，我在意你", category: "表达" },
  { text: "开始做，不等准备完美", category: "克服拖延" },
  { text: "把今天的焦虑列出来，一条条看", category: "释放" },
  { text: "做一件让明天的自己更好的睡前准备", category: "未来" },
  { text: "允许自己失败一次，然后继续", category: "勇气" },
  { text: "今天说一句真正想说的话", category: "表达" },
];

let count = 0;
let lastIndex = -1;

function initStars() {
  const stars = document.getElementById('stars');
  for (let i = 0; i < 60; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = Math.random() * 100 + '%';
    s.style.width = s.style.height = (Math.random() * 2 + 0.5) + 'px';
    s.style.setProperty('--d', (Math.random() * 4 + 2) + 's');
    s.style.animationDelay = Math.random() * 4 + 's';
    stars.appendChild(s);
  }
}

function drawAction() {
  let idx;
  do { idx = Math.floor(Math.random() * actions.length); }
  while (idx === lastIndex && actions.length > 1);
  lastIndex = idx;

  const card = document.getElementById('actionCard');
  const text = document.getElementById('actionText');
  const cat = document.getElementById('actionCategory');
  const btn = document.getElementById('actionBtn');
  const hint = document.getElementById('hint');
  const badge = document.getElementById('countBadge');

  card.classList.add('fade');

  setTimeout(() => {
    const a = actions[idx];
    text.textContent = a.text;
    cat.textContent = a.category;
    btn.textContent = '再来一个';
    hint.textContent = '🍎 去吧，别想了';

    count++;
    badge.textContent = '已行动 ' + count + ' 次';

    card.classList.remove('fade');
  }, 350);
}

document.getElementById('appleBtn').addEventListener('click', drawAction);

initStars();
</script>
</body>
</html>
